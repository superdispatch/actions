name: PR

on:
  pull_request:
    branches:
      - '**'

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: superdispatch/actions/prepare-node-repo@main
        with:
          node-version: 24
      - run: pnpm tsc
      - run: pnpm lint
      - uses: superdispatch/actions/update-snapshots@main
        with:
          command: pnpm build --verify
          update-command: pnpm build
